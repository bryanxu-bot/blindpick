<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盲选餐厅 - 扫码体验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fef5ec;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;padding:16px;gap:16px}
canvas{display:block;width:92vw;max-width:360px;height:auto;border-radius:24px;box-shadow:0 12px 48px rgba(0,0,0,.12)}
.btn{width:92vw;max-width:360px;height:52px;border-radius:16px;border:none;background:linear-gradient(135deg,#FF6B35,#E8551A);color:white;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,.3);display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.hint{font-size:12px;color:#B2BEC3;text-align:center}
</style>
</head>
<body>
<canvas id="card"></canvas>
<button class="btn" onclick="save()">💾 保存到相册</button>
<div class="hint">保存后发朋友圈 / 微信群，别人扫码就能玩</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script>
const W=720,H=980,url='https://bryanxu-bot.github.io/blindpick/'
const canvas=document.getElementById('card'),ctx=canvas.getContext('2d')
canvas.width=W;canvas.height=H

async function draw(){
  // 背景
  const bg=ctx.createLinearGradient(0,0,W*.5,H*.35)
  bg.addColorStop(0,'#FF7B42');bg.addColorStop(.5,'#FF5E2C');bg.addColorStop(1,'#E84313')
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H)

  // 点阵
  ctx.fillStyle='rgba(255,255,255,.1)'
  for(let x=14;x<W;x+=18)for(let y=14;y<H;y+=18){ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill()}

  // 装饰圆
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=2
  ctx.beginPath();ctx.arc(W+40,-80,240,0,Math.PI*2);ctx.stroke()
  ctx.beginPath();ctx.arc(W+60,-100,300,0,Math.PI*2);ctx.stroke()

  // Hero
  const hY=160
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.arc(W/2,hY,62,0,Math.PI*2);ctx.fill()
  ctx.font='54px sans-serif';ctx.textAlign='center';ctx.fillText('🥘',W/2,hY+20)
  ctx.font='bold 13px "PingFang SC","Helvetica Neue",sans-serif';ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText('TODAY\'S PICK',W/2,hY+112)
  ctx.font='bold 50px "PingFang SC","Hiragino Sans GB",sans-serif';ctx.fillStyle='white';ctx.fillText('盲选餐厅',W/2,hY+178)

  // 白色卡片
  const cX=28,cY=370,cW=W-56,cH=H-cY-26
  ctx.fillStyle='#FFFBF5'
  ctx.beginPath();roundRect(ctx,cX,cY,cW,cH,26);ctx.fill()

  // 虚线
  ctx.strokeStyle='#E8D5C4';ctx.lineWidth=1.5;ctx.setLineDash([7,5])
  ctx.beginPath();ctx.moveTo(cX+24,cY);ctx.lineTo(cX+cW-24,cY);ctx.stroke();ctx.setLineDash([])

  // 描述
  ctx.font='bold 30px "PingFang SC",sans-serif';ctx.fillStyle='#2D3436';ctx.textAlign='center'
  ctx.fillText('今天吃什么？',W/2,cY+58)
  ctx.font='18px "PingFang SC",sans-serif';ctx.fillStyle='#636E72'
  ctx.fillText('一键盲选周边 3km 好评餐厅，匹配你的口味',W/2,cY+96)

  // QR
  const qrW=264,qrX=(W-qrW)/2,qrY=cY+124
  const qrData=await QRCode.toDataURL(url,{width:qrW,margin:2,color:{dark:'#E8551A',light:'#FFFBF5'}})
  const qrImg=new Image()
  await new Promise((resolve)=>{qrImg.onload=resolve;qrImg.src=qrData})
  ctx.drawImage(qrImg,qrX,qrY,qrW,qrW)

  ctx.font='15px "PingFang SC",sans-serif';ctx.fillStyle='#B2BEC3'
  ctx.fillText('📱 微信扫码 → 开始盲选',W/2,qrY+qrW+36)

  // 功能
  const fY=qrY+qrW+76
  ctx.strokeStyle='#F0E8DC';ctx.lineWidth=1
  ctx.beginPath();ctx.moveTo(50,fY-20);ctx.lineTo(W-50,fY-20);ctx.stroke()

  const feats=[{i:'📍',t:'周边3km'},{i:'⭐',t:'好评筛选'},{i:'🎰',t:'盲盒惊喜'},{i:'📤',t:'分享好友'}]
  const gap=(W-60)/feats.length
  feats.forEach((f,j)=>{
    const fx=30+gap*j+gap/2
    ctx.font='30px sans-serif';ctx.textAlign='center';ctx.fillText(f.i,fx,fY+20)
    ctx.font='15px "PingFang SC",sans-serif';ctx.fillStyle='#636E72';ctx.fillText(f.t,fx,fY+52)
  })

  // 底部
  ctx.font='13px "PingFang SC",sans-serif';ctx.fillStyle='#B2BEC3';ctx.textAlign='center'
  ctx.fillText('让每一餐都有惊喜',W/2,H-30)
}

function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r)
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r)
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r)
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()
}

function save(){
  canvas.toBlob(blob=>{
    const el=document.createElement('a')
    el.download='盲选餐厅.png';el.href=URL.createObjectURL(blob)
    el.click()
    URL.revokeObjectURL(el.href)
  },'image/png')
}

draw()
</script>
</body>
</html>
