<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>盲选餐厅 - 扫码体验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;background:#fef5ec;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  padding:20px 16px 40px;gap:16px;overflow-x:hidden;
}

/* Floating orbs */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,53,.18),transparent 70%);
  animation-timing-function:ease-in-out;animation-iteration-count:infinite;
}
.orb.a{width:140px;height:140px;top:8%;left:-40px;animation:floatA 7s infinite}
.orb.b{width:100px;height:100px;top:55%;right:-30px;animation:floatB 6s infinite;animation-delay:-2s}
.orb.c{width:90px;height:90px;top:25%;left:65%;animation:floatC 8s infinite;animation-delay:-4s}
@keyframes floatA{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-24px) scale(1.08)}}
@keyframes floatB{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.06)}}
@keyframes floatC{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.1)}}

/* Card image (shown after render, right-click save) */
.card-img{
  display:none;width:92vw;max-width:360px;height:auto;
  border-radius:24px;box-shadow:0 16px 48px rgba(0,0,0,.1);
  position:relative;z-index:1;
}
.card-img.show{display:block}

canvas{display:none}

/* Buttons */
.btns{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  width:92vw;max-width:360px;position:relative;z-index:1;
}
.btn{
  width:100%;height:54px;border-radius:16px;border:none;
  font-size:17px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
.btn:active{transform:scale(.96)}
.btn-download{
  background:linear-gradient(135deg,#FF6B35,#E8551A);color:white;
  box-shadow:0 4px 24px rgba(255,107,53,.28);
}
.btn-copy{
  background:white;color:#E8551A;border:2px solid #F0E8DC;
}
.hint{
  font-size:13px;color:#B2BEC3;text-align:center;position:relative;z-index:1;
  line-height:1.6;
}

/* Loader */
.loader{
  width:48px;height:48px;border:4px solid #F0E8DC;border-top-color:#E8551A;
  border-radius:50%;animation:spin .8s linear infinite;position:relative;z-index:1;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal (mobile long-press) */
.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:999;
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px;gap:18px;
}
.modal.show{display:flex}
.modal img{
  width:82vw;max-width:380px;border-radius:20px;
  box-shadow:0 24px 64px rgba(0,0,0,.35);
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal .tip{
  color:white;font-size:15px;font-weight:600;text-align:center;
  background:rgba(255,255,255,.14);padding:12px 24px;border-radius:14px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.modal .close{
  width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);color:white;font-size:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>

<div class="orbs">
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="orb c"></div>
</div>

<div class="loader" id="loader"></div>
<canvas id="card"></canvas>
<img class="card-img" id="cardImg" src="" alt="盲选餐厅入口卡 - 右键保存或长按保存" />

<div class="btns" id="btns" style="display:none">
  <button class="btn btn-download" id="btnDownload">💾 下载图片</button>
  <button class="btn btn-copy" id="btnCopy">🔗 复制链接发给朋友</button>
  <div class="hint">
    下载 PNG 后直接发微信 / 朋友圈<br>
    对方扫码即可开始盲选餐厅
  </div>
</div>

<div class="modal" id="modal">
  <img id="modalImg" src="" alt="盲选餐厅入口卡" />
  <div class="tip">👆 长按图片 → 保存到相册</div>
  <button class="close" id="modalClose">✕</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script>
const W = 720, H = 980, APP_URL = 'https://bryanxu-bot.github.io/blindpick/'
const canvas = document.getElementById('card')
const ctx = canvas.getContext('2d')
canvas.width = W; canvas.height = H

const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y)
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r)
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r)
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r)
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r)
  ctx.closePath()
}

async function draw() {
  // Background
  const bg = ctx.createLinearGradient(0, 0, W * 0.5, H * 0.35)
  bg.addColorStop(0, '#FF7B42'); bg.addColorStop(0.5, '#FF5E2C'); bg.addColorStop(1, '#E84313')
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H)

  // Dot grid
  ctx.fillStyle = 'rgba(255,255,255,.06)'
  for (let x = 16; x < W; x += 24)
    for (let y = 16; y < H; y += 24) {
      ctx.beginPath(); ctx.arc(x, y, 0.9, 0, Math.PI * 2); ctx.fill()
    }

  // Decorative arcs
  ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = 2
  ctx.beginPath(); ctx.arc(W + 40, -80, 240, 0, Math.PI * 2); ctx.stroke()
  ctx.beginPath(); ctx.arc(W + 60, -100, 300, 0, Math.PI * 2); ctx.stroke()

  // Hero
  const hY = 130
  ctx.fillStyle = 'rgba(255,255,255,.18)'
  ctx.beginPath(); ctx.arc(W / 2, hY, 58, 0, Math.PI * 2); ctx.fill()
  ctx.font = '48px sans-serif'; ctx.textAlign = 'center'
  ctx.fillText('🥘', W / 2, hY + 17)
  ctx.font = 'bold 12px "PingFang SC","Helvetica Neue",sans-serif'
  ctx.fillStyle = 'rgba(255,255,255,.7)'
  ctx.fillText('TODAY\'S PICK', W / 2, hY + 95)
  ctx.font = 'bold 46px "PingFang SC","Hiragino Sans GB",sans-serif'
  ctx.fillStyle = 'white'
  ctx.fillText('盲选餐厅', W / 2, hY + 155)

  // White card
  const cX = 28, cY = 320, cW = W - 56, cH = H - cY - 26
  ctx.fillStyle = '#FFFBF5'
  ctx.beginPath(); roundRect(ctx, cX, cY, cW, cH, 26); ctx.fill()

  // Dashed divider
  ctx.strokeStyle = '#E8D5C4'; ctx.lineWidth = 1.5; ctx.setLineDash([7, 5])
  ctx.beginPath(); ctx.moveTo(cX + 24, cY); ctx.lineTo(cX + cW - 24, cY); ctx.stroke()
  ctx.setLineDash([])

  // Description
  ctx.font = 'bold 28px "PingFang SC",sans-serif'; ctx.fillStyle = '#2D3436'; ctx.textAlign = 'center'
  ctx.fillText('今天吃什么？', W / 2, cY + 50)
  ctx.font = '17px "PingFang SC",sans-serif'; ctx.fillStyle = '#636E72'
  ctx.fillText('一键盲选周边 3km 好评餐厅，匹配你的口味', W / 2, cY + 84)

  // QR
  const qrW = 240, qrX = (W - qrW) / 2, qrY = cY + 108
  const qrData = await QRCode.toDataURL(APP_URL, {
    width: qrW, margin: 2, color: { dark: '#E8551A', light: '#FFFBF5' }
  })
  const qrImg = new Image()
  await new Promise(resolve => { qrImg.onload = resolve; qrImg.src = qrData })
  ctx.drawImage(qrImg, qrX, qrY, qrW, qrW)

  ctx.font = '14px "PingFang SC",sans-serif'; ctx.fillStyle = '#B2BEC3'
  ctx.fillText('📱 微信扫码 → 开始盲选', W / 2, qrY + qrW + 32)

  // Features
  const fY = qrY + qrW + 68
  ctx.strokeStyle = '#F0E8DC'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(50, fY - 16); ctx.lineTo(W - 50, fY - 16); ctx.stroke()

  const feats = [
    { i: '📍', t: '周边3km' }, { i: '⭐', t: '好评筛选' },
    { i: '🎰', t: '盲盒惊喜' }, { i: '📤', t: '分享好友' }
  ]
  const gap = (W - 60) / feats.length
  feats.forEach((f, j) => {
    const fx = 30 + gap * j + gap / 2
    ctx.font = '28px sans-serif'; ctx.textAlign = 'center'
    ctx.fillText(f.i, fx, fY + 18)
    ctx.font = '14px "PingFang SC",sans-serif'; ctx.fillStyle = '#636E72'
    ctx.fillText(f.t, fx, fY + 46)
  })

  // Footer
  ctx.font = '12px "PingFang SC",sans-serif'; ctx.fillStyle = '#B2BEC3'; ctx.textAlign = 'center'
  ctx.fillText('让每一餐都有惊喜', W / 2, H - 28)
}

// Init
draw().then(() => {
  // Hide loader, show image + buttons
  document.getElementById('loader').style.display = 'none'
  const dataUrl = canvas.toDataURL('image/png')
  const img = document.getElementById('cardImg')
  img.src = dataUrl
  img.classList.add('show')
  document.getElementById('btns').style.display = 'flex'

  // Download button
  document.getElementById('btnDownload').addEventListener('click', () => {
    if (isMobile) {
      // Mobile: show modal for long-press save
      document.getElementById('modalImg').src = dataUrl
      document.getElementById('modal').classList.add('show')
    } else {
      // Desktop: direct download
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url; a.download = '盲选餐厅.png'
        document.body.appendChild(a); a.click(); document.body.removeChild(a)
        setTimeout(() => URL.revokeObjectURL(url), 1000)
      }, 'image/png')
    }
  })

  // Copy link button
  document.getElementById('btnCopy').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(APP_URL)
      const btn = document.getElementById('btnCopy')
      const orig = btn.textContent
      btn.textContent = '✅ 链接已复制'
      setTimeout(() => { btn.textContent = orig }, 2000)
    } catch(e) {
      alert('复制失败，手动复制：' + APP_URL)
    }
  })
})

// Modal close
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('show')
})
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('modal').classList.remove('show')
})
</script>
</body>
</html>
